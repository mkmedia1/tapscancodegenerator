<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TapScan Mobile Preview</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: #f5f6fa;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .header {
      width: 100%;
      background: #2F3886;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 32px;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 50;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    }

    .header img {
      height: 26px;
      display: block;
      mix-blend-mode: screen;
    }

    .stage {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 100px 40px 60px;
      background: #f5f6fa;
      gap: 96px;
    }

    .qr-side {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
    }

    .qr-card {
      line-height: 0;
    }

    .qr-card svg {
      width: 240px;
      height: 240px;
      display: block;
      border-radius: 16px;
      box-shadow:
        0 30px 75px rgba(0,0,0,0.21),
        0 9px 22px rgba(0,0,0,0.14);
    }

    .arrow-wrap {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .phone-wrap {
      position: relative;
      width: 320px;
      flex-shrink: 0;
    }

    .phone-shell {
      position: relative;
      width: 320px;
      height: 654px;
      background: linear-gradient(160deg, #1e2040 0%, #131636 60%, #0e1128 100%);
      border-radius: 52px;
      padding: 14px;
      box-shadow:
        inset 0 0 0 1.5px #2a2d52,
        inset 0 0 0 3px #0a0c1e,
        0 0 0 1px #3a3d62,
        0 0 0 1.5px #1a1d3a,
        0 30px 75px rgba(0,0,0,0.21),
        0 9px 22px rgba(0,0,0,0.14);
    }

    .phone-shell::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 52px;
      background: linear-gradient(110deg, rgba(255,255,255,0.06) 0%, transparent 40%);
      pointer-events: none;
    }

    .phone-inner {
      width: 100%;
      height: 100%;
      background: #131636;
      border-radius: 40px;
      overflow: hidden;
      position: relative;
    }

    .screen {
      width: 100%;
      height: 100%;
      border-radius: 40px;
      overflow: hidden;
      position: relative;
      background: #f0f0f0;
    }

    .screen iframe {
      width: 390px;
      height: 844px;
      border: none;
      display: block;
      transform-origin: top left;
      transform: scale(0.7487);
      pointer-events: auto;
    }

    .screen::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 40px;
      background: linear-gradient(120deg, rgba(255,255,255,0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 5;
    }

    .btn { position: absolute; background: #1e2245; border-radius: 3px; }
    .btn-power  { right: -4px; top: 140px; width: 4px; height: 76px; border-radius: 0 3px 3px 0; }
    .btn-mute   { left: -4px;  top: 78px;  width: 4px; height: 30px; border-radius: 3px 0 0 3px; }
    .btn-vol-up { left: -4px;  top: 120px; width: 4px; height: 48px; border-radius: 3px 0 0 3px; }
    .btn-vol-dn { left: -4px;  top: 178px; width: 4px; height: 48px; border-radius: 3px 0 0 3px; }

    .hint {
      position: fixed;
      bottom: 24px;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 17px;
      color: #9a9eb8;
      letter-spacing: 0.03em;
      pointer-events: none;
    }

    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap');

    .phone-overlay {
      position: absolute;
      inset: 0;
      border-radius: 40px;
      background: rgba(10, 12, 30, 0.75);
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 20;
      cursor: pointer;
      transition: opacity 0.4s ease;
    }

    .phone-overlay.dismissed {
      opacity: 0;
      pointer-events: none;
    }

    .phone-overlay-icon {
      width: 52px;
      height: 52px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2s ease-in-out infinite;
    }

    .phone-overlay-text {
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 13px;
      text-align: center;
      line-height: 1.5;
      padding: 0 24px;
      opacity: 0.9;
      letter-spacing: 0.02em;
    }

    .phone-overlay-sub {
      color: rgba(255,255,255,0.5);
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      font-size: 11px;
      text-align: center;
      letter-spacing: 0.04em;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); background: rgba(255,255,255,0.15); }
      50% { transform: scale(1.1); background: rgba(255,255,255,0.25); }
    }

    .home-bar {      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
